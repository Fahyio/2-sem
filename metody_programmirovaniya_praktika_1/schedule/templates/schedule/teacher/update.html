{% extends 'schedule/base.html' %}

{% block content %}
<h1>Редактировать преподавателя: {{ teacher.get_full_name }}</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}

        <h3>Основная информация</h3>
        {{ teacher_form.as_p }}

        <h3>Дополнительная информация</h3>
        {{ info_form.as_p }}

        <button type="submit" class="btn btn-warning">Обновить</button>
        <a href="{% url 'schedule:teacher_info' teacher.pk %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
